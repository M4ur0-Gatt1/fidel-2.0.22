<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LOW — Diagnóstico Tableta</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', system-ui, sans-serif; background: #1a1a2e; color: #eee;
         display: flex; height: 100vh; overflow: hidden; }
  #panel { width: 380px; min-width: 380px; background: #16213e; padding: 16px;
           overflow-y: auto; border-right: 2px solid #0f3460; display: flex; flex-direction: column; gap: 10px; }
  #panel h2 { color: #e94560; font-size: 18px; margin-bottom: 4px; }
  #panel h3 { color: #0f3460; font-size: 13px; margin: 8px 0 4px; border-bottom: 1px solid #0f3460; padding-bottom: 4px; }
  #log { flex: 1; background: #0f0f1a; border-radius: 8px; padding: 10px; overflow-y: auto;
         font-family: 'Cascadia Code', 'Fira Code', 'Consolas', monospace; font-size: 11px; line-height: 1.5;
         max-height: calc(100vh - 100px); }
  .ev { padding: 2px 4px; border-radius: 3px; margin: 1px 0; white-space: nowrap; }
  .ev.pen { background: #1a3a1a; border-left: 3px solid #4caf50; }
  .ev.mouse { background: #1a1a3a; border-left: 3px solid #2196F3; }
  .ev.touch { background: #3a1a1a; border-left: 3px solid #ff9800; }
  .ev.ignored { background: #2a2a2a; border-left: 3px solid #666; opacity: 0.6; }
  .ev.warn { background: #3a3a1a; border-left: 3px solid #ffeb3b; }
  .badge { display: inline-block; padding: 1px 6px; border-radius: 10px; font-size: 10px; font-weight: bold; margin-right: 4px; }
  .badge.down { background: #4caf50; color: #000; }
  .badge.move { background: #2196F3; color: #fff; }
  .badge.up { background: #f44336; color: #fff; }
  .badge.raw { background: #9c27b0; color: #fff; }
  .badge.cancel { background: #ff5722; color: #fff; }
  .badge.lost { background: #607d8b; color: #fff; }
  #canvas-wrap { flex: 1; display: flex; align-items: center; justify-content: center; position: relative; }
  #testCanvas { border: 2px dashed #0f3460; background: #fff; cursor: crosshair;
                touch-action: none; /* CRÍTICO: sin esto el navegador hace scroll en vez de mandar eventos */ }
  #stats { position: absolute; bottom: 16px; right: 16px; background: rgba(0,0,0,0.8);
           padding: 8px 14px; border-radius: 8px; font-size: 12px; }
  #stats span { margin: 0 8px; }
  .val { color: #4caf50; font-weight: bold; }
  .clear-btn { background: #e94560; color: #fff; border: none; padding: 6px 14px; border-radius: 6px;
               cursor: pointer; font-size: 12px; }
  .clear-btn:hover { background: #ff6b81; }
</style>
</head>
<body>

<div id="panel">
  <h2>🩺 Diagnóstico Tableta</h2>
  <p style="font-size:11px;color:#999;">Dibujá UNA línea en el canvas blanco. Todos los eventos quedan registrados abajo.</p>
  <button class="clear-btn" onclick="clearLog()">🗑 Limpiar log</button>
  <div>
    <h3>📊 Resumen</h3>
    <div id="summary" style="font-size:11px;">Esperando eventos...</div>
  </div>
  <h3>📋 Eventos (más recientes arriba)</h3>
  <div id="log"><em style="color:#666;">Dibujá en el canvas para ver eventos...</em></div>
</div>

<div id="canvas-wrap">
  <canvas id="testCanvas" width="800" height="600"></canvas>
  <div id="stats">
    <span>Events: <span class="val" id="cnt">0</span></span>
    <span>Pen: <span class="val" id="cntPen">0</span></span>
    <span>Raw: <span class="val" id="cntRaw">0</span></span>
  </div>
</div>

<script>
const canvas = document.getElementById('testCanvas');
const ctx = canvas.getContext('2d');
const logEl = document.getElementById('log');
const summaryEl = document.getElementById('summary');
let events = [];
let drawing = false;
let pts = [];
let trackPid = null;
let cnt = 0, cntPen = 0, cntRaw = 0;
let lastDown = null;

// Dibujar grid en el canvas
ctx.fillStyle = '#fff';
ctx.fillRect(0, 0, canvas.width, canvas.height);
ctx.strokeStyle = '#e0e0e0';
ctx.lineWidth = 0.5;
for (let x = 0; x <= canvas.width; x += 40) { ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, canvas.height); ctx.stroke(); }
for (let y = 0; y <= canvas.height; y += 40) { ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(canvas.width, y); ctx.stroke(); }

function clearLog() { events = []; logEl.innerHTML = ''; cnt = cntPen = cntRaw = 0; updateStats(); ctx.clearRect(0, 0, canvas.width, canvas.height); ctx.fillStyle='#fff'; ctx.fillRect(0,0,canvas.width,canvas.height); }
function updateStats() {
  document.getElementById('cnt').textContent = cnt;
  document.getElementById('cntPen').textContent = cntPen;
  document.getElementById('cntRaw').textContent = cntRaw;
}

function fmtPr(p) {
  if (p == null) return 'null';
  return p.toFixed(4);
}

function fmtTilt(e) {
  let tx = e.tiltX != null ? e.tiltX : '?';
  let ty = e.tiltY != null ? e.tiltY : '?';
  return `tw:(${tx},${ty})`;
}

function addEvent(type, e, note) {
  cnt++;
  const isPen = e.pointerType === 'pen';
  if (isPen) cntPen++;
  const cls = isPen ? 'pen' : (e.pointerType === 'touch' ? 'touch' : 'mouse');
  const badge = type === 'pointerdown' ? 'down' : (type === 'pointermove' ? 'move' : (type === 'pointerup' ? 'up' : (type === 'pointerrawupdate' ? 'raw' : (type === 'pointercancel' ? 'cancel' : 'lost'))));
  const pr = e.pressure != null ? e.pressure : null;
  
  const html = `<div class="ev ${cls}">
    <span class="badge ${badge}">${type}</span>
    <b>${e.pointerType||'?'}</b> id:${e.pointerId}
    pr:<b style="color:${pr>0?'#4caf50':'#ff5252'}">${fmtPr(pr)}</b>
    btn:${e.button} btns:${e.buttons}
    ${fmtTilt(e)}
    (${e.offsetX?.toFixed(0)||'?'},${e.offsetY?.toFixed(0)||'?'})
    ${note ? ' <span style="color:#ffeb3b">'+note+'</span>' : ''}
  </div>`;
  
  events.unshift(html);
  if (events.length > 200) events.pop();
  logEl.innerHTML = events.join('');
  updateStats();
  
  // Resumen
  summaryEl.innerHTML = `
    Último: <b>${type}</b> ${e.pointerType} | presión: <b>${fmtPr(pr)}</b><br>
    botón: ${e.button} | botones máscara: ${e.buttons}<br>
    tilt: (${e.tiltX??'?'}, ${e.tiltY??'?'})<br>
    HW: width=${e.width??'?'} height=${e.height??'?'}
  `;
}

// === Event Listeners ===
canvas.addEventListener('pointerdown', (e) => {
  e.preventDefault();
  canvas.setPointerCapture(e.pointerId);
  addEvent('pointerdown', e);
  drawing = true;
  trackPid = e.pointerId;
  lastDown = { x: e.offsetX, y: e.offsetY, pr: e.pressure || 0.5 };
  pts = [lastDown];
  
  // Dibujar punto inicial
  ctx.fillStyle = '#e94560';
  ctx.beginPath();
  ctx.arc(e.offsetX, e.offsetY, 4, 0, Math.PI*2);
  ctx.fill();
});

canvas.addEventListener('pointermove', (e) => {
  if (!drawing || e.pointerId !== trackPid) {
    addEvent('pointermove', e, 'hover (ignorado)');
    return;
  }
  
  const evs = e.getCoalescedEvents ? e.getCoalescedEvents() : [e];
  for (const ev of evs) {
    addEvent('pointermove', ev);
    pts.push({ x: ev.offsetX, y: ev.offsetY, pr: ev.pressure || 0.5 });
  }
  
  // Dibujar línea
  ctx.strokeStyle = '#e94560';
  ctx.lineWidth = (e.pressure || 0.5) * 8;
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';
  ctx.beginPath();
  ctx.moveTo(lastDown.x, lastDown.y);
  for (let i = 1; i < pts.length; i++) {
    ctx.lineTo(pts[i].x, pts[i].y);
  }
  ctx.stroke();
  lastDown = pts[pts.length - 1];
});

canvas.addEventListener('pointerup', (e) => {
  addEvent('pointerup', e);
  drawing = false;
  trackPid = null;
});

canvas.addEventListener('pointercancel', (e) => {
  addEvent('pointercancel', e, '⚠ CANCELADO');
  drawing = false;
  trackPid = null;
});

canvas.addEventListener('lostpointercapture', (e) => {
  addEvent('lostpointercapture', e, '⚠ LOST CAPTURE');
});

canvas.addEventListener('pointerrawupdate', (e) => {
  cntRaw++;
  if (!drawing || e.pointerId !== trackPid) {
    addEvent('pointerrawupdate', e, 'hover raw (ignorado)');
    return;
  }
  const evs = e.getCoalescedEvents ? e.getCoalescedEvents() : [e];
  for (const ev of evs) {
    addEvent('pointerrawupdate', ev);
    pts.push({ x: ev.offsetX, y: ev.offsetY, pr: ev.pressure || 0.5 });
  }
  // Dibujar
  ctx.strokeStyle = '#e94560';
  ctx.lineWidth = (e.pressure || 0.5) * 8;
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';
  ctx.beginPath();
  ctx.moveTo(lastDown.x, lastDown.y);
  for (let i = 1; i < pts.length; i++) {
    ctx.lineTo(pts[i].x, pts[i].y);
  }
  ctx.stroke();
  lastDown = pts[pts.length - 1];
  updateStats();
});

// También escuchar eventos globales para ver si caen en window pero no en canvas
window.addEventListener('pointerdown', (e) => {
  if (e.target === canvas || canvas.contains(e.target)) return; // ya capturado
  addEvent('pointerdown', e, '⚠ cayó en WINDOW');
});
window.addEventListener('pointermove', (e) => {
  if (e.target === canvas || canvas.contains(e.target)) return;
  // No loguear todos los moves globales, solo los de pen
  if (e.pointerType === 'pen') addEvent('pointermove', e, '⚠ global (no canvas)');
});

console.log('[LOW Diag] Listo. Dibujá en el canvas para diagnosticar tu tableta.');
console.log('[LOW Diag] pointerType esperado: "pen" (no "mouse" ni "touch")');
console.log('[LOW Diag] Si no ves eventos, el navegador no reconoce tu tableta.');
</script>
</body>
</html>
