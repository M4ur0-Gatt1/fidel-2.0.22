name: Build & Release

on:
  push:
    tags:
      - 'v*'

jobs:
  # ── Windows ──
  windows:
    runs-on: windows-latest
    outputs:
      version: ${{ steps.ver.outputs.VERSION }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install deps
        run: pip install -r requirements.txt pyinstaller

      - name: Build icon & exe
        run: |
          python make_icon.py
          python -m PyInstaller LOW.spec --noconfirm --clean

      - name: Inno Setup installer
        run: |
          choco install innosetup -y --no-progress
          $ver = "${{ github.ref_name }}".TrimStart('v')
          echo "VERSION=$ver" >> $env:GITHUB_OUTPUT
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" /DAppVersion=$ver low_installer.iss
        id: ver2
        shell: pwsh

      - name: Upload LOW.exe
        uses: softprops/action-gh-release@v2
        with:
          files: dist/LOW.exe

      - name: Upload installer
        uses: softprops/action-gh-release@v2
        with:
          files: Output/LOWSetup-*.exe

  # ── macOS ──
  macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install deps
        run: |
          pip install -r requirements.txt pyinstaller "pywebview[cocoa]"

      - name: Build
        run: |
          python make_icon.py
          python -m PyInstaller LOW.spec --noconfirm --clean
          cd dist && zip -r ../LOW-macos.zip LOW.app/ && cd ..

      - name: Upload
        uses: softprops/action-gh-release@v2
        with:
          files: LOW-macos.zip

  # ── Linux ──
  linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install system deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq libgtk-3-dev libwebkit2gtk-4.1-dev python3-pyqt5.qtwebengine

      - name: Install pip deps
        run: |
          pip install -r requirements.txt pyinstaller "pywebview[qt]"

      - name: Build
        run: |
          python make_icon.py
          python -m PyInstaller LOW.spec --noconfirm --clean
          mv dist/LOW dist/LOW-linux

      - name: Upload
        uses: softprops/action-gh-release@v2
        with:
          files: dist/LOW-linux
